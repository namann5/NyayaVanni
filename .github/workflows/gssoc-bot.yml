name: GSSoC Automation Bot

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-Label and Auto-Assign
        uses: actions/github-script@v7
        with:
          script: |
            const { context, github } = require('@actions/github-script');
            
            // 1. Auto-label new issues with 'gssoc26'
            if (context.eventName === 'issues' && context.payload.action === 'opened') {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['gssoc26']
              });
            }
            
            // 2. Auto-assign the first person who comments
            if (context.eventName === 'issue_comment' && context.payload.action === 'created') {
              const comment = context.payload.comment.body.toLowerCase();
              const issue = context.payload.issue;
              const commenter = context.payload.comment.user.login;
              
              // Check if they are asking to be assigned AND the issue has no assignees yet
              const askingForAssignment = comment.includes('assign') || comment.includes('work on this') || comment.includes('take this');
              
              if (askingForAssignment && !issue.assignees || issue.assignees.length === 0) {
                
                // Assign the user
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  assignees: [commenter]
                });
                
                // Post an automatic welcome comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Hi @${commenter}, welcome to NyayaVanni! 🎉 I am an automated bot, and I have assigned this issue to you since you claimed it first. You can go ahead and get started. Happy coding! 🚀`
                });
              }
            }
